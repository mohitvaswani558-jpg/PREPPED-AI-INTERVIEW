<!-- Micro-interactions Script -->
<script>
        // Create dynamic waveform
        const container = document.getElementById('waveform-container');
        const barCount = 40;
        const bars = [];

        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'waveform-bar w-1 bg-primary rounded-full opacity-60';
            bar.style.height = '8px';
            container.appendChild(bar);
            bars.push(bar);
        }

        // Animate waveform
        function animateWaveform() {
            bars.forEach(bar => {
                const randomHeight = Math.floor(Math.random() * 32) + 8;
                bar.style.height = `${randomHeight}px`;
                // Add gold tint occasionally
                if (Math.random() > 0.8) {
                    bar.style.backgroundColor = 'var(--tw-color-tertiary)';
                } else {
                    bar.style.backgroundColor = '';
                }
            });
            requestAnimationFrame(() => {
                setTimeout(animateWaveform, 100);
            });
        }

        animateWaveform();

        // Keyboard interaction simulation
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                const micIcon = document.querySelector('.w-12.h-12');
                micIcon.classList.toggle('bg-error');
                micIcon.classList.toggle('bg-tertiary');
                const label = document.querySelector('.text-tertiary');
                label.textContent = label.textContent === 'LISTENING' ? 'MUTED' : 'LISTENING';
                label.classList.toggle('text-error');
                label.classList.toggle('text-tertiary');
            }
        });
    </script>
